<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to LootTable - Premium Board Game Subscription">
    <title>Login | LootTable</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">

    <!-- Google Fonts - Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .auth-wrapper {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(4rem + env(safe-area-inset-top, 0px)) 2rem calc(4rem + env(safe-area-inset-bottom, 0px)) 2rem;
            position: relative;
            overflow-y: auto;
            background: var(--primary-bg);
        }

        @media (max-height: 850px) {
            .auth-wrapper {
                align-items: flex-start;
                padding-top: calc(2.5rem + env(safe-area-inset-top, 0px));
                padding-bottom: calc(2.5rem + env(safe-area-inset-bottom, 0px));
            }
        }

        .auth-toggles {
            z-index: 2;
        }

        @media (max-width: 576px) {
            .auth-card {
                margin-top: 4.5rem;
            }

            .auth-toggles {
                padding: 1rem !important;
            }
        }

        .auth-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none !important;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .auth-brand:hover {
            transform: scale(1.05);
        }

        .auth-brand i {
            color: var(--accent-color);
            font-size: 1.8rem;
            margin-right: 0.5rem;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            z-index: 1;
        }

        .auth-card .glass-card {
            padding: 2.5rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-color);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover,
        .text-accent:hover {
            color: var(--text-primary) !important;
            text-decoration: underline;
        }

        /* Fixed Brand Color for both modes in Auth page as requested */
        .auth-brand-text {
            color: var(--text-primary) !important;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <!-- Floating particles background effect -->
        <div class="hero-bg-particles">
            <div class="particle" style="width: 10px; height: 10px; left: 10%; top: 20%; animation-delay: 0s;"></div>
            <div class="particle" style="width: 15px; height: 15px; left: 80%; top: 40%; animation-delay: 2s;"></div>
            <div class="particle" style="width: 8px; height: 8px; left: 30%; top: 70%; animation-delay: 4s;"></div>
            <div class="particle" style="width: 12px; height: 12px; left: 60%; top: 10%; animation-delay: 1s;"></div>
        </div>

        <div class="auth-card">
            <div class="glass-card">
                <div class="text-center mb-5 mt-2">
                    <a href="index.html" class="auth-brand">
                        <i class="bi bi-box-seam"></i>
                        <span class="auth-brand-text">LootTable</span>
                    </a>
                    <h2 class="mb-2">Welcome Back</h2>
                    <p class="text-secondary small">Log in to your mystery vault</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label for="password" class="form-label">Password</label>
                            <a href="#" class="small text-accent">Forgot?</a>
                        </div>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-premium w-100 py-3 mt-2">Login to Vault</button>

                    <div class="mt-4 text-center">
                        <span class="text-secondary small">Or login with</span>
                        <div class="d-flex gap-3 justify-content-center mt-3">
                            <button type="button" class="btn btn-outline-glass px-4"><i
                                    class="bi bi-google"></i></button>
                            <button type="button" class="btn btn-outline-glass px-4"><i
                                    class="bi bi-discord"></i></button>
                        </div>
                    </div>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Vault Access</a>
                </div>
            </div>
        </div>

        <!-- Quick Toggles -->
        <div class="auth-toggles position-absolute top-0 end-0 p-4 d-flex gap-3">
            <button id="themeToggle" class="btn btn-outline-glass rounded-circle p-2" title="Toggle Theme">
                <i class="bi bi-moon-stars"></i>
            </button>
            <button id="rtlToggle" class="btn btn-outline-glass rounded-circle p-2" title="Toggle RTL">
                <i class="bi bi-text-left"></i>
            </button>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS (Shared Theme/RTL Logic) -->
    <script src="assets/js/main.js"></script>
</body>

</html>
