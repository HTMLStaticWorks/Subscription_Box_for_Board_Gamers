<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GameBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-wrapper">
    <!-- Theme & RTL Toggles -->
    <div style="position: fixed; top: 1.5rem; right: 1.5rem; display: flex; gap: 1rem; align-items: center; z-index: 2000;">
        <button id="rtl-toggle" class="btn btn-outline"
            style="padding: 0.4rem 0.8rem; font-size: 0.75rem; border-color: var(--border); color: var(--text); background: var(--surface);">RTL</button>
        <button id="theme-toggle" class="toggle-btn" title="Toggle Theme" style="color: var(--text); background: var(--surface); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow);">
            <i data-lucide="moon"></i>
        </button>
    </div>

    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                <i data-lucide="dices"></i>
                GameBox
            </a>
            <h2 style="margin-top: 1rem;">Welcome Back!</h2>
            <p style="color: var(--text-muted);">Please enter your details to login.</p>
        </div>

        <form action="dashboard.html">
            <div class="form-group">
                <label>Email Address</label>
                <div style="position: relative;">
                    <i data-lucide="mail" size="18" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="email" class="form-control" style="padding-left: 3rem;" placeholder="name@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.85rem; color: var(--primary);">Forgot Password?</a>
                </div>
                <div style="position: relative;">
                    <i data-lucide="lock" size="18" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" class="form-control" style="padding-left: 3rem;" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="remember">
                <label for="remember" style="margin-bottom: 0; font-size: 0.9rem; font-weight: 400;">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            
            <div style="text-align: center; margin: 1.5rem 0; color: var(--text-muted); position: relative;">
                <span style="background: var(--surface); padding: 0 1rem; position: relative; z-index: 1;">OR</span>
                <hr style="position: absolute; top: 50%; width: 100%; border: 0; border-top: 1px solid var(--border); margin: 0;">
            </div>

            <div style="display: flex; gap: 1rem;">
                <button type="button" class="btn btn-outline" style="flex: 1; border-color: var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 0.5rem;" title="Login with Google">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083L43.611,20.083L42,20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                </button>
                <button type="button" class="btn btn-outline" style="flex: 1; border-color: var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 0.5rem;" title="Login with Apple">
                    <i data-lucide="apple"></i>
                </button>
            </div>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 700;">Sign Up</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
