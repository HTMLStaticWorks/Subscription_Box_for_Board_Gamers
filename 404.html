<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Dungeon | LootTable</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at center, var(--primary-bg) 0%, rgba(0, 0, 0, 1) 100%);
        }

        .dungeon-text {
            filter: drop-shadow(0 0 20px rgba(255, 107, 129, 0.8));
        }

        .eye-graphic {
            animation: scan 4s infinite ease-in-out alternate;
            transform-origin: center;
        }

        @keyframes scan {
            0% {
                transform: translateX(-20px) scale(0.9);
            }

            100% {
                transform: translateX(20px) scale(1.1);
            }
        }
    </style>
</head>

<body>

    <!-- Header / Navbar Minimal -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand m-0 mx-auto" href="index.html">
                <i class="bi bi-box-seam"></i> LootTable
            </a>
            <div class="position-absolute end-0 me-3 mt-3 mt-lg-0 top-0 pt-2 pe-3">
                <button id="themeToggle" class="toggle-btn" title="Toggle Theme"><i
                        class="bi bi-moon-stars"></i></button>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <section class="flex-grow-1 d-flex justify-content-center align-items-center text-center position-relative">

        <div class="container position-relative z-1">
            <!-- Giant custom SVG for "mimic" or "dungeon" error -->
            <svg width="250" height="250" viewBox="0 0 24 24" fill="none" class="mb-4 text-danger anti-gravity-delayed">
                <!-- Treasure chest base -->
                <path d="M4 12V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V12" stroke="currentColor"
                    stroke-width="1.5" fill="rgba(255,107,129,0.1)" />
                <path d="M4 12C4 8 8 6 12 6C16 6 20 8 20 12" stroke="currentColor" stroke-width="1.5" />
                <!-- Mimic eye -->
                <ellipse cx="12" cy="10" rx="4" ry="2" fill="currentColor" class="eye-graphic" />
                <circle cx="12" cy="10" r="1" fill="#000" class="eye-graphic" />
                <!-- Teeth snippet -->
                <path d="M4 12L6 14L8 12L10 14L12 12L14 14L16 12L18 14L20 12" stroke="currentColor" stroke-width="1"
                    stroke-linecap="round" />
            </svg>

            <h1 class="display-1 fw-bold text-danger mb-0 dungeon-text" style="line-height: 1;">404</h1>
            <h2 class="mb-4 text-white">Oops. A Mimic ate this page.</h2>
            <p class="text-secondary max-w-md mx-auto mb-5">Roll initiative, or retreat to safety. The URL you're
                looking for doesn't exist, was typed incorrectly, or has moved to a completely different tile on the
                board.</p>

            <div class="d-flex justify-content-center gap-3">
                <a href="index.html" class="btn btn-premium px-5 py-3"><i class="bi bi-house-door-fill me-2"></i> Return
                    to Default State</a>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>
</body>

</html>
