<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for LootTable - Premium Board Game Subscription">
    <title>Sign Up | LootTable</title>

    <!-- Google Fonts - Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            background: var(--primary-bg);
        }

        .auth-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text-primary) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none !important;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .auth-brand:hover {
            transform: scale(1.05);
        }

        .auth-brand i {
            color: var(--accent-color);
            font-size: 1.8rem;
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            z-index: 1;
        }

        .auth-card .glass-card {
            padding: 3rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-color);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-brand-text {
            color: var(--text-primary) !important;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <!-- Floating particles background effect -->
        <div class="hero-bg-particles">
            <div class="particle" style="width: 10px; height: 10px; left: 10%; top: 20%; animation-delay: 0s;"></div>
            <div class="particle" style="width: 15px; height: 15px; left: 80%; top: 40%; animation-delay: 2s;"></div>
            <div class="particle" style="width: 8px; height: 8px; left: 30%; top: 70%; animation-delay: 4s;"></div>
            <div class="particle" style="width: 12px; height: 12px; left: 60%; top: 10%; animation-delay: 1s;"></div>
        </div>

        <div class="auth-card">
            <a href="index.html" class="auth-brand">
                <i class="bi bi-box-seam"></i>
                <span class="auth-brand-text">LootTable</span>
            </a>

            <div class="glass-card">
                <h2 class="text-center mb-4">Join the Collective</h2>
                <p class="text-center text-secondary mb-4">Start your mystery box journey today</p>

                <form>
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                        <div class="col-6">
                            <label for="confirmPassword" class="form-label">Confirm</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••"
                                required>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label small" for="terms">I agree to the <a href="#"
                                class="text-accent">Terms & Conditions</a></label>
                    </div>
                    <button type="submit" class="btn btn-premium w-100 py-3 mt-2">Create My Vault</button>

                    <div class="mt-4 text-center">
                        <span class="text-secondary small">Or sign up with</span>
                        <div class="d-flex gap-3 justify-content-center mt-3">
                            <button type="button" class="btn btn-outline-glass px-4"><i
                                    class="bi bi-google"></i></button>
                            <button type="button" class="btn btn-outline-glass px-4"><i
                                    class="bi bi-discord"></i></button>
                        </div>
                    </div>
                </form>

                <div class="auth-footer">
                    Already a member? <a href="login.html">Login Here</a>
                </div>
            </div>
        </div>

        <!-- Quick Toggles -->
        <div class="position-absolute bottom-0 end-0 p-4 d-flex gap-3">
            <button id="themeToggle" class="btn btn-outline-glass rounded-circle p-2" title="Toggle Theme">
                <i class="bi bi-moon-stars"></i>
            </button>
            <button id="rtlToggle" class="btn btn-outline-glass rounded-circle p-2" title="Toggle RTL">
                <i class="bi bi-text-left"></i>
            </button>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS (Shared Theme/RTL Logic) -->
    <script src="assets/js/main.js"></script>
</body>

</html>
