<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | LootTable</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .countdown-box {
            width: 90px;
            height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .countdown-box span {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
            line-height: 1;
            margin-bottom: 5px;
        }

        .countdown-box small {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }
    </style>
</head>

<body
    style="background: url('https://images.unsplash.com/photo-1614051000679-055a6d3663b6?q=80&w=2670&auto=format&fit=crop') center/cover no-repeat; position: relative;">

    <!-- Overlay -->
    <div class="position-absolute w-100 h-100 top-0 start-0 z-0 bg-black opacity-75"></div>

    <!-- Header / Navbar Minimal -->
    <nav class="navbar navbar-custom bg-transparent border-0 z-1 pt-4">
        <div class="container">
            <a class="navbar-brand text-white mx-auto d-flex flex-column align-items-center" href="index.html">
                <i class="bi bi-box-seam fs-1 text-warning mb-2 anti-gravity"></i>
                <span class="fs-4">LootTable</span>
            </a>
            <div class="position-absolute end-0 me-4 top-0 pt-4">
                <button id="themeToggle" class="toggle-btn" title="Toggle Theme"><i
                        class="bi bi-moon-stars text-white"></i></button>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <section
        class="flex-grow-1 d-flex justify-content-center align-items-center text-center position-relative z-1 px-3">
        <div class="container">

            <div class="badge border border-warning text-warning mb-4 px-3 py-2 rounded-pill bg-black"
                style="box-shadow: 0 0 15px rgba(255,215,0,0.2);">A New Box Category</div>
            <h1 class="display-2 fw-bold text-white mb-3">Roll to <span class="text-warning">Initialize</span>...</h1>
            <p class="lead text-light opacity-75 max-w-md mx-auto mb-5">We are crafting a brand new tier dedicated
                exclusively to Miniature painting and custom terrain building. Development is underway.</p>

            <!-- Countdown injected dynamically -->
            <div class="d-flex justify-content-center gap-3 gap-md-4 mb-5 flex-wrap" id="countdownContainer">
                <div class="countdown-box glow-hover"><span id="days">00</span><small>Days</small></div>
                <div class="countdown-box glow-hover"><span id="hours">00</span><small>Hours</small></div>
                <div class="countdown-box glow-hover"><span id="mins">00</span><small>Mins</small></div>
                <div class="countdown-box glow-hover"><span id="secs">00</span><small>Secs</small></div>
            </div>

            <!-- Email capture -->
            <div class="glass-card mx-auto p-2 rounded-pill d-flex bg-black"
                style="max-width: 500px; border-color: var(--secondary-color);">
                <input type="email" class="form-control bg-transparent border-0 text-white shadow-none ps-4"
                    placeholder="Enter guild email for early access...">
                <button class="btn btn-premium rounded-pill px-4 text-nowrap">Notify Me</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer bg-transparent border-0 position-relative z-1 mt-0">
        <div class="container text-center pb-4 text-white opacity-50 small">
            ©
            <script>document.write(new Date().getFullYear())</script> LootTable Headquarters. Transmission secured.
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        // Simple Countdown Script (Counting down 30 days from load roughly)
        document.addEventListener('DOMContentLoaded', () => {
            const countDownDate = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);

            const x = setInterval(function () {
                const now = new Date().getTime();
                const distance = countDownDate - now;

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("days").innerHTML = days < 10 ? '0' + days : days;
                document.getElementById("hours").innerHTML = hours < 10 ? '0' + hours : hours;
                document.getElementById("mins").innerHTML = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById("secs").innerHTML = seconds < 10 ? '0' + seconds : seconds;

                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("countdownContainer").innerHTML = "<h2 class='text-warning mx-auto text-uppercase tracking-widest'>The Portals Are Open</h2>";
                }
            }, 1000);
        });
    </script>
</body>

</html>
